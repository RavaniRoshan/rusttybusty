  </defs>
  <rect x="50" y="20" width="700" height="100" rx="24" fill="rgba(25,25,25,0.6)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="70" y="70" font-family="Inter, sans-serif" font-size="14" fill="#b7410e" font-weight="600">LAYER 1</text>
  <text x="120" y="70" font-family="Playfair Display, serif" font-size="24" fill="#f5f5f5" font-weight="600">Node Structure</text>
  <text x="400" y="110" font-family="Inter, sans-serif" font-size="13" fill="rgba(245,245,245,0.6)" text-anchor="middle">Arc + ImVector + ImHashMap</text>
  <path d="M400 120 L400 170" stroke="#b7410e" stroke-width="2" stroke-dasharray="4 4" marker-end="url(#arrowhead)"/>
  <rect x="50" y="180" width="700" height="100" rx="24" fill="rgba(25,25,25,0.6)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="70" y="230" font-family="Inter, sans-serif" font-size="14" fill="#b7410e" font-weight="600">LAYER 2</text>
  <text x="120" y="230" font-family="Playfair Display, serif" font-size="24" fill="#f5f5f5" font-weight="600">Tree Builder and Mutate</text>
  <text x="400" y="270" font-family="Inter, sans-serif" font-size="13" fill="rgba(245,245,245,0.6)" text-anchor="middle">Recursive path-based cloning</text>
  <path d="M400 280 L400 330" stroke="#b7410e" stroke-width="2" stroke-dasharray="4 4" marker-end="url(#arrowhead)"/>
  <rect x="50" y="340" width="700" height="100" rx="24" fill="rgba(25,25,25,0.6)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="70" y="390" font-family="Inter, sans-serif" font-size="14" fill="#b7410e" font-weight="600">LAYER 3</text>
  <text x="120" y="390" font-family="Playfair Display, serif" font-size="24" fill="#f5f5f5" font-weight="600">Concurrent Reader</text>
  <text x="400" y="430" font-family="Inter, sans-serif" font-size="13" fill="rgba(245,245,245,0.6)" text-anchor="middle">Lock-free traversal</text>
